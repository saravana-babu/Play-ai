version: '3.8'

services:
  # The Reverse Proxy (Automates Redirection & SSL)
  traefik:
    image: traefik:v2.10
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # SSL Automation (Let's Encrypt)
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${SSL_EMAIL:-admin@play-ai.in}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      # Global HTTP -> HTTPS Redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - playai_network
  # The Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-playai}
      - JWT_SECRET=${JWT_SECRET:-please_change_this_secret_key_123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - playai_network
    # AUTOMATION LABELS
    labels:
      - "traefik.enable=true"
      # Redirection: Route play-ai.in to this container
      - "traefik.http.routers.playai.rule=Host(`play-ai.in`)"
      - "traefik.http.routers.playai.entrypoints=websecure"
      - "traefik.http.routers.playai.tls.certresolver=myresolver"
      # Internal Redirection to Port 3000
      - "traefik.http.services.playai.loadbalancer.server.port=3000"

  # The Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-play-ai}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-play-ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U play-ai" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - playai_network

volumes:
  pgdata:
  letsencrypt:
